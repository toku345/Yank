version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    groups:
      codeql-action:
        patterns:
          - "github/codeql-action*"
    open-pull-requests-limit: 5
