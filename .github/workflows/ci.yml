name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Show environment
        run: |
          xcodebuild -version
          swift --version

      - name: Install tools
        run: brew install xcodegen swiftlint shellcheck

      - name: Lint
        run: swiftlint lint --strict

      - name: Lint shell scripts
        run: shellcheck scripts/*.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build production configuration
        run: |
          xcodebuild -project Yank.xcodeproj \
            -scheme Yank-Production \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Verify unsigned build is rejected
        run: |
          app_path="DerivedData/Build/Products/Release/Yank.app"
          [[ -d "${app_path}" ]] || {
            echo "error: built app not found at ${app_path}" >&2
            exit 1
          }
          if scripts/verify-production-app.sh "${app_path}"; then
            echo "error: verify-production-app.sh accepted an unsigned build" >&2
            exit 1
          fi
          echo "verify-production-app.sh rejected the unsigned build as expected"

      - name: Test
        run: |
          xcodebuild -project Yank.xcodeproj \
            -scheme Yank \
            -configuration Debug \
            -destination 'platform=macOS' \
            test
    timeout-minutes: 15
