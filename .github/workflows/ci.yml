name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Show environment
        run: |
          xcodebuild -version
          swift --version

      - name: Install tools
        run: brew install xcodegen swiftlint

      - name: Lint
        run: swiftlint lint --strict

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild -project Yank.xcodeproj \
            -scheme Yank \
            -configuration Debug \
            -destination 'platform=macOS' \
            build

      - name: Test
        run: |
          xcodebuild -project Yank.xcodeproj \
            -scheme Yank \
            -configuration Debug \
            -destination 'platform=macOS' \
            test
    timeout-minutes: 15
