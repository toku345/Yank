name: Yank
options:
  bundleIdPrefix: com.toku345
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

# 開発者ごとの署名設定の注入口 (issue #11 / ADR 0007)。
# Debug 限定: 個人の開発証明書を Release/archive に波及させない。
configFiles:
  Debug: SupportingFiles/Base.xcconfig

targets:
  Yank:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
    info:
      path: SupportingFiles/Info.plist
      properties:
        CFBundleDisplayName: Yank
        CFBundleName: Yank
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.utilities
        LSUIElement: true
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSAccessibilityUsageDescription: >-
          Yank needs Accessibility access to simulate paste (Cmd+V)
          after selecting a clipboard history item.
        NSHumanReadableCopyright: "Copyright © 2026 toku345. All rights reserved."
    entitlements:
      path: SupportingFiles/Yank.entitlements
      properties:
        # CGEvent（ペースト実行）と Carbon API（グローバルホットキー）は Sandbox 内で動作しない
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toku345.Yank
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: SupportingFiles/Yank.entitlements
        ENABLE_HARDENED_RUNTIME: true
      configs:
        Release:
          # Distribution builds must not inherit the debugger entitlement.
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
          ENABLE_CODE_COVERAGE: NO
    postCompileScripts:
      - script: |
          if [ "$YANK_SKIP_SWIFTLINT" = "1" ]; then
            echo "SwiftLint skipped (YANK_SKIP_SWIFTLINT=1)"
            exit 0
          fi
          if command -v swiftlint > /dev/null 2>&1; then
            swiftlint lint --strict --quiet
          else
            echo "error: SwiftLint not installed. Install with: brew install swiftlint"
            exit 1
          fi
        name: SwiftLint
        basedOnDependencyAnalysis: false
    scheme:
      testTargets:
        - YankTests
      gatherCoverageData: true

  YankTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/YankTests
    dependencies:
      - target: Yank
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toku345.YankTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Yank-Production:
    build:
      targets:
        Yank: all
    run:
      config: Release
    profile:
      config: Release
    analyze:
      config: Release
    archive:
      config: Release
      customArchiveName: Yank
      revealArchiveInOrganizer: false
